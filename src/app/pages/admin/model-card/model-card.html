<div class="mt-6 w-full rounded-[24px] border border-white/15 bg-[#161722] p-5 text-white">
  <div class="flex items-start justify-between gap-6">
    <div class="flex flex-1 items-start gap-5">
      <img
        class="h-[120px] w-[120px] rounded-[18px] object-cover"
        [src]="model.image"
        [alt]="model.name"
      />

      <div class="min-w-0 flex-1">
        <h3 class="text-[22px] font-semibold leading-none">{{ model.name }}</h3>
        <p class="mt-2 text-[16px] text-[#C9B8A6]">{{ model.description }}</p>

        <div class="mt-4 flex flex-wrap gap-2">
          @for (tag of model.tags; track tag) {
            <span class="rounded-full bg-[#4D257A] px-4 py-1 text-sm font-medium text-[#E577FF]">
              {{ tag }}
            </span>
          }
        </div>

        <div class="mt-4 flex flex-wrap gap-3">
          <button
            type="button"
            class="flex cursor-pointer items-center gap-2 rounded-lg hover:bg-secondary transition-colors border border-white/20 bg-[#0F1018] px-5 py-1 text-[16px] font-semibold text-white"
          >
            <svg
              class="h-5 w-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <span>View</span>
          </button>

          <button
            type="button"
            class="flex cursor-pointer items-center gap-2 rounded-lg hover:bg-secondary transition-colors border border-white/20 bg-[#0F1018] px-5 py-1 text-[16px] font-semibold text-white"
          >
            <svg
              class="h-5 w-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4Z" />
            </svg>
            <span>Edit</span>
          </button>

          <button
            type="button"
            class="flex cursor-pointer items-center gap-2 rounded-lg hover:bg-red-400 transition-colors border border-red-500/40 bg-[#0F1018] px-5 py-1 text-[16px] font-semibold text-white"
          >
            <svg
              class="h-5 w-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M3 6h18" />
              <path d="M8 6V4h8v2" />
              <path d="M19 6l-1 14H6L5 6" />
              <path d="M10 11v6" />
              <path d="M14 11v6" />
            </svg>
            <span>Delete</span>
          </button>
        </div>
      </div>
    </div>

    <div class="flex flex-wrap justify-end gap-2">
      @for (status of model.statuses; track status.label) {
        <span class="rounded-full px-4 py-1 text-sm font-semibold" [class]="status.className">
          {{ status.label }}
        </span>
      }
    </div>
  </div>
</div>
